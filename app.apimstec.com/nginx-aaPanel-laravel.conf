# Laravel + Inertia (Vue) — Nginx config for aaPanel
# Fixes 404 when clicking Vue/Inertia links (e.g. portal.compresspdf.id).
#
# ADD the block below into your site Nginx config (Config tab).
# Place it right after #REWRITE-END and before "# Forbidden files or directories".

    # Laravel: send all non-file requests to index.php (fixes Vue/Inertia 404)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

# ---
# Optional: if the rewrite file already has a "location /" block, either remove it
# in aaPanel → URL rewrite, or set URL rewrite to "None" so only the block above applies.
# Rewrite file path: /www/server/panel/vhost/rewrite/portal.compresspdf.id.conf
