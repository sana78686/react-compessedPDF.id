<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" type="image/png" href="/logos/compresspdf-favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Preconnect to API origin for faster nav/footer data (Lighthouse Performance) -->
    <link rel="preconnect" href="https://portal.compresspdf.id" crossorigin />
    <link rel="dns-prefetch" href="https://portal.compresspdf.id" />
    <meta name="theme-color" content="#ffffff" />
    <!-- Static fallbacks — overwritten at build time by cms-seo-inject plugin from CMS API,
         and again at runtime by React SeoHead from CMS API for regular users. -->
    <meta name="robots" content="index, follow" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Compress PDF" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>Compress PDF</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
