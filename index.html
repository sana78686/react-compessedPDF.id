<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" type="image/png" href="/logos/compresspdf-favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Preconnect to API origins for faster CMS JSON (match VITE_API_URL host in production builds). -->
    <link rel="preconnect" href="https://portal.compresspdf.id" crossorigin />
    <link rel="dns-prefetch" href="https://portal.compresspdf.id" />
    <link rel="dns-prefetch" href="https://app.apimstec.com" />
    <link rel="preconnect" href="https://flagcdn.com" crossorigin />
    <link rel="dns-prefetch" href="https://flagcdn.com" />
    <meta name="theme-color" content="#ffffff" />
    <!-- Meta title/description/OG and CMS &lt;head&gt; snippet are not duplicated here as React
         components: see src/components/SeoHead.jsx (injects meta at runtime) and
         src/components/DynamicSeoHead.jsx (home + compress routes: CMS SEO + head snippet + GA4).
         Configure in CMS: Content manager → Home (head snippet), SEO → Analytics (GA4).
         Optional dev fallback: VITE_GA_MEASUREMENT_ID in .env -->
    <!-- Static fallbacks — overwritten at build time by cms-seo-inject plugin from CMS API,
         and again at runtime by React SeoHead from CMS API for regular users. -->
    <meta name="robots" content="index, follow" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Compress PDF" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>Compress PDF</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
